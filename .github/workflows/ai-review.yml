name: AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
  

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-review:
    name: Run AI code review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq python-dotenv

      - name: Extract PR differences
        run: |
            git diff origin/${{ github.base_ref }}...HEAD \
            -- '*.py' '*.sh' '*.js' '*.ts' '*.go' '*.yaml' '*.yml' \
            > pr_diff.txt

            DIFF_LINES=$(wc -l < pr_diff.txt)

            echo "Diff size: $DIFF_LINES lines"

            if [ "$DIFF_LINES" -eq 0 ]; then
            echo "NO_CODE_CHANGES=true" >> $GITHUB_ENV
            echo "No reviewable code found in the PR"

            else
            echo "NO_CODE_CHANGES=false" >> $GITHUB_ENV
            fi

      - name: AI Code review
        if: env.NO_CODE_CHANGES == 'false'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
            python3 ai-code-reviewer/scripts/review.py --stdin < pr_diff.txt

      - name: Post Review as PR comment
        if: env.NO_CODE_CHANGES == 'false' && github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
            cat << EOF > comment_payload.md
            ## AI Review
            > Powered by Groq (Llama 3.3 70B) | Triggered by @$ACTOR
            EOF

            cat review_output.txt >> comment_payload.md

            cat << EOF >> comment_payload.md
            --- 
            *This review was generated automatically. Use your own judgement before acting on suggestions.* 
            EOF

            jq -n --rawfile body comment_payload.md '{"body": $body}' > json_payload.json

            curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            -d @json_payload.json

            echo "Review posted to PR #${{ github.event.pull_request.number }}"
        
      - name: Skip review notification
        if: env.NO_CODE_CHANGES == 'true'
        run: |
          echo "No reviewable code changes detected."
          echo "Skipping AI review."
